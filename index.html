<!DOCTYPE html>
<html lang="en">
<head>

<style>

  --bg: #0b0d14;
  --surface: #13162a;
  --surface2: #1c2040;
  --surface3: #222647;
  --border: #2a2f5a;
  --text: #e2e8f0;
  --muted: #7c87a6;
  --market: #3b82f6;
  --industry: #f59e0b;
  --company: #8b5cf6;

  --down: #ef4444;
  --alert: #fbbf24;
  --high: #10b981;
  --moderate: #f59e0b;
  --low: #ef4444;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 1.5; min-height: 100vh; }

/* HEADER */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
.header-inner { max-width: 1440px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 58px; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo h1 { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
.logo-mark { font-size: 22px; }
.header-meta { display: flex; align-items: center; gap: 14px; }
.refresh-time { font-size: 12px; color: var(--muted); }

/* TICKER BAR */
.ticker-bar { background: #0d0f1c; border-bottom: 1px solid var(--border); display: flex; align-items: stretch; height: 36px; overflow: hidden; position: sticky; top: 58px; z-index: 99; }
.ticker-tabs { display: flex; flex-shrink: 0; }
.ticker-tab { padding: 0 14px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); cursor: pointer; border: none; background: none; border-right: 1px solid var(--border); height: 100%; transition: color 0.15s, background 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 5px; }
.ticker-tab:hover { color: var(--text); background: var(--surface2); }
.ticker-tab.active { color: var(--text); background: var(--surface2); box-shadow: inset 0 -2px 0 var(--market); }
.ticker-tab .tab-dot { width: 6px; height: 6px; border-radius: 50%; }
.ticker-wrap { flex: 1; overflow: hidden; mask-image: linear-gradient(to right, transparent, black 2%, black 98%, transparent); min-width: 0; }
.ticker-scroll { display: inline-flex; align-items: center; white-space: nowrap; animation: tickerMove 60s linear infinite; }
.ticker-scroll:hover { animation-play-state: paused; cursor: default; }
@keyframes tickerMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
.ticker-item { display: inline-flex; align-items: center; gap: 5px; padding: 0 16px; font-size: 12px; border-right: 1px solid var(--border); height: 36px; }
.ticker-sym { font-weight: 700; color: var(--text); }
.ticker-name { color: var(--muted); font-size: 11px; }
.ticker-price { color: var(--muted); }
.ticker-chg { font-weight: 600; }
.ticker-chg.pos { color: var(--up); }
.ticker-chg.neg { color: var(--down); }
.ticker-weight { font-size: 10px; color: var(--muted); background: var(--surface2); padding: 1px 5px; border-radius: 3px; }
.ticker-section { display: inline-flex; align-items: center; padding: 0 10px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; border-right: 1px solid var(--border); height: 36px; white-space: nowrap; }
.ticker-section.up { color: var(--up); }
.ticker-section.dn { color: var(--down); }
.ticker-section.neutral { color: var(--muted); }
.ticker-loading { font-size: 11px; color: var(--muted); padding: 0 16px; display: flex; align-items: center; height: 36px; }
.ticker-badge { font-size: 9px; font-weight: 800; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
.badge-buy  { background: rgba(16,185,129,0.15); color: var(--up);   border: 1px solid rgba(16,185,129,0.3); }
.badge-sell { background: rgba(239,68,68,0.12);  color: var(--down); border: 1px solid rgba(239,68,68,0.25); }

/* BUTTONS */
.btn { padding: 7px 14px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity 0.15s, transform 0.1s; }
.btn:hover { opacity: 0.85; }

/* BANNERS */

/* DIVIDER */

/* ATTRIBUTION */

.attr-chart-wrap { display: flex; gap: 16px; align-items: center; margin-bottom: 14px; }
.attr-chart-canvas { flex-shrink: 0; }
.attr-summary-text { flex: 1; }
.attr-summary-line { font-size: 13px; line-height: 1.55; color: var(--muted); }

.attr-bars { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }

/* RECOVERY BOX */

/* OPPORTUNITY SCORE */

/* EVENT TAG */
.event-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; margin-top: 6px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }

/* NARRATIVE */
.narrative { font-size: 12px; line-height: 1.55; color: var(--muted); margin-top: 10px; padding: 10px 12px; background: var(--surface2); border-radius: 7px; border-left: 3px solid var(--market); }

/* MINI ATTRIBUTION (non-flagged) */

/* LOADING SPINNER */
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--market); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ERROR */
.error-text { color: #ef4444; font-size: 12px; margin-top: 6px; }

/* RESPONSIVE */
@media (max-width: 860px) {
  .main { grid-template-columns: 1fr; padding: 14px; }
  .sidebar { position: static; }
}
@media (max-width: 480px) {
  .stock-grid { grid-template-columns: 1fr; }
  .attr-chart-wrap { flex-direction: column; align-items: flex-start; }
}

<body>
<div id="root"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG
// ═══════════════════════════════════════════════════════════
const SECTOR_ETFS = {
  'Technology': 'XLK',
  'Healthcare': 'XLV',
  'Financials': 'XLF',
  'Consumer Discretionary': 'XLY',
  'Consumer Staples': 'XLP',
  'Energy': 'XLE',
  'Utilities': 'XLU',
  'Materials': 'XLB',
  'Industrials': 'XLI',
  'Real Estate': 'XLRE',
  'Communication Services': 'XLC',
};

// Historical mean-reversion probabilities by attribution source (estimated from academic literature)
const RECOVERY_RATES = { market: 0.76, industry: 0.54, company: 0.28 };

// Opportunity score weights
const OPP_WEIGHTS = { market: 0.75, industry: 0.52, company: 0.18 };

const MARKET_TICKER = 'SPY';
const REGRESSION_WINDOW = 60;
const REFRESH_MS = 5 * 60 * 1000;

// Multiple proxies tried in order — first success wins
const PROXY_FNS = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://thingproxy.freeboard.io/fetch/${url}`,
];

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
let trackedStocks = JSON.parse(localStorage.getItem('smt_stocks') || '[]');
let results = {};
let marketCache = null;
let sectorCache = {};
let chartInstances = {};
let isRefreshing = false;

// ═══════════════════════════════════════════════════════════
//  DATA FETCHING
// ═══════════════════════════════════════════════════════════
function parseYFJson(json, ticker) {
  if (json.chart?.error) throw new Error(json.chart.error.description || 'Yahoo Finance error');
  const r = json.chart?.result?.[0];
  if (!r) throw new Error('No data returned');
  const ts = r.timestamp || [];
  const adj = r.indicators?.adjclose?.[0]?.adjclose;
  const raw = r.indicators?.quote?.[0]?.close;
  const closes = adj || raw || [];
  const prices = [];
  for (let i = 0; i < ts.length; i++) {
    if (closes[i] != null && closes[i] > 0)
      prices.push({ date: new Date(ts[i] * 1000), close: closes[i] });
  }
  return {
    ticker: ticker.toUpperCase(),
    name: r.meta?.longName || r.meta?.shortName || ticker.toUpperCase(),
    currentPrice: r.meta?.regularMarketPrice ?? prices[prices.length - 1]?.close ?? null,
    previousClose: r.meta?.previousClose ?? prices[prices.length - 2]?.close ?? null,
    prices
  };
}

async function fetchYF(ticker) {
  const yfUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(ticker.toUpperCase())}?range=3mo&interval=1d`;
  let lastError;
  for (const proxyFn of PROXY_FNS) {
    try {
      const res = await fetch(proxyFn(yfUrl));
      if (!res.ok) { lastError = new Error(`HTTP ${res.status}`); continue; }
      const json = await res.json();
      return parseYFJson(json, ticker);
    } catch (e) {
      lastError = e;
    }
  }
  throw lastError || new Error(`Could not fetch ${ticker}`);
}

async function fetchNews(ticker) {
  try {
    const url = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(ticker)}&quotesCount=0&newsCount=6&enableFuzzyQuery=false`;
    const res = await fetch(CORS + encodeURIComponent(url));
    if (!res.ok) return [];
    const json = await res.json();
    return (json.news || []).map(n => n.title || '');
  } catch {
    return [];
  }
}

// ═══════════════════════════════════════════════════════════
//  MATH — ATTRIBUTION MODEL
// ═══════════════════════════════════════════════════════════
function alignByDate(a, b, c) {
  const mb = new Map(b.map(d => [d.date.toDateString(), d.close]));
  const mc = new Map(c.map(d => [d.date.toDateString(), d.close]));
  const aligned = a
    .filter(d => mb.has(d.date.toDateString()) && mc.has(d.date.toDateString()))
    .map(d => ({
      s: d.close,
      m: mb.get(d.date.toDateString()),
      i: mc.get(d.date.toDateString())
    }));
  return aligned;
}

function returns(aligned) {
  const out = [];
  for (let i = 1; i < aligned.length; i++) {
    out.push({
      s: (aligned[i].s - aligned[i-1].s) / aligned[i-1].s,
      m: (aligned[i].m - aligned[i-1].m) / aligned[i-1].m,
      i: (aligned[i].i - aligned[i-1].i) / aligned[i-1].i
    });
  }
  return out;
}

function mean(arr) { return arr.reduce((a, b) => a + b, 0) / arr.length; }
function betaOf(x, y) {
  const mx = mean(x), my = mean(y);
  const cov = x.reduce((s, xi, k) => s + (xi - mx) * (y[k] - my), 0);
  const vx = x.reduce((s, xi) => s + (xi - mx) ** 2, 0);
  return vx === 0 ? 0 : cov / vx;
}

function attribute(stockData, mktData, secData) {
  const aligned = alignByDate(stockData.prices, mktData.prices, secData.prices);
  if (aligned.length < 10) return null;

  const window = Math.min(aligned.length - 1, REGRESSION_WINDOW);
  const rets = returns(aligned);
  const slice = rets.slice(-window);

  const sR = slice.map(d => d.s);
  const mR = slice.map(d => d.m);
  const iR = slice.map(d => d.i);

  // Stage 1: market beta
  const βM = betaOf(mR, sR);

  // Stage 2: sector beta on sector excess (removes market from sector)
  const secExcess = iR.map((r, k) => r - mR[k]);
  const sResid = sR.map((r, k) => r - βM * mR[k]);
  const βI = betaOf(secExcess, sResid);

  // Latest day decomposition
  const latest = rets[rets.length - 1];
  const latestSecExcess = latest.i - latest.m;

  const mComp = βM * latest.m;
  const iComp = βI * latestSecExcess;
  const cComp = latest.s - mComp - iComp;

  const absSum = Math.abs(mComp) + Math.abs(iComp) + Math.abs(cComp);
  const safe = absSum > 0.0001;

  const mPct = safe ? Math.abs(mComp) / absSum * 100 : 33.3;
  const iPct = safe ? Math.abs(iComp) / absSum * 100 : 33.3;
  const cPct = safe ? Math.abs(cComp) / absSum * 100 : 33.3;

  // Recovery probability (weighted by attribution share)
  const recoveryProb = (mPct/100 * RECOVERY_RATES.market +
                        iPct/100 * RECOVERY_RATES.industry +
                        cPct/100 * RECOVERY_RATES.company) * 100;

  // Opportunity score: magnitude × weighted recovery likelihood
  const magnitude = Math.abs(latest.s * 100);
  const opportunityScore = Math.min(100, magnitude *
    (mPct/100 * OPP_WEIGHTS.market + iPct/100 * OPP_WEIGHTS.industry + cPct/100 * OPP_WEIGHTS.company) * 10);

  return {
    stockReturn: latest.s * 100,
    mComp: mComp * 100,
    iComp: iComp * 100,
    cComp: cComp * 100,
    mPct, iPct, cPct,
    βM: +βM.toFixed(2), βI: +βI.toFixed(2),
    recoveryProb: +recoveryProb.toFixed(1),
    opportunityScore: +opportunityScore.toFixed(1)
  };
}

// ═══════════════════════════════════════════════════════════
//  EVENT CLASSIFICATION
// ═══════════════════════════════════════════════════════════
const EVENT_PATTERNS = [
  { label: 'Earnings Report',         color: '#6366f1', keys: ['earnings','eps','revenue','guidance','quarterly','beat','miss','profit','loss','q1','q2','q3','q4'] },
  { label: 'M&A Activity',            color: '#ec4899', keys: ['merger','acquisition','acquir','buyout','takeover','deal','bid','acquire'] },
  { label: 'Regulatory / FDA',        color: '#f97316', keys: ['fda','regulatory','approved','approval','recall','investigation','sec ','lawsuit','settlement'] },
  { label: 'Management Change',       color: '#a78bfa', keys: ['ceo','cfo','executive','resign','appoint','restructur','layoff','workforce'] },
  { label: 'Macroeconomic Event',     color: '#22d3ee', keys: ['fed ','federal reserve','interest rate','inflation','recession','tariff','trade war','gdp'] },
  { label: 'Product / Competition',   color: '#84cc16', keys: ['product','launch','competi','market share','partnership','contract','wins','loses'] },
];

function classifyEvent(headlines) {
  if (!headlines || headlines.length === 0) return null;
  const text = headlines.join(' ').toLowerCase();
  const scores = EVENT_PATTERNS.map(p => ({
    ...p,
    score: p.keys.filter(k => text.includes(k)).length
  }));
  scores.sort((a, b) => b.score - a.score);
  return scores[0].score > 0 ? scores[0] : null;
}

function recoveryLabel(prob) {
  if (prob >= 65) return { text: 'HIGH', color: 'var(--high)' };
  if (prob >= 45) return { text: 'MODERATE', color: 'var(--moderate)' };
  return { text: 'LOW', color: 'var(--low)' };
}

function opportunityColor(score) {
  if (score >= 65) return 'var(--high)';
  if (score >= 35) return 'var(--moderate)';
  return 'var(--muted)';
}

function buildNarrative(ticker, attr, event) {
  const { stockReturn, mPct, iPct, cPct, recoveryProb, opportunityScore } = attr;
  const dir = stockReturn < 0 ? 'declined' : 'gained';
  const abs = Math.abs(stockReturn).toFixed(1);
  const macroShare = (mPct + iPct).toFixed(0);
  const rl = recoveryLabel(recoveryProb);
  let eventNote = '';
  if (event) eventNote = ` Recent headlines suggest a <strong>${event.label}</strong> may be a contributing factor.`;
  return `<strong>${ticker}</strong> has ${dir} <strong>${abs}%</strong>. Analysis attributes <strong>${macroShare}%</strong> of the move to market and sector forces versus <strong>${cPct.toFixed(0)}%</strong> to company-specific factors.${eventNote} Historical recovery probability: <strong style="color:${rl.color}">${recoveryProb}%</strong>.`;
}

async function fetchScreener(scrId) {
  const yfUrl = `https://query2.finance.yahoo.com/v1/finance/screener/predefined/saved?scrIds=${scrId}&count=8&start=0`;
  for (const proxyFn of PROXY_FNS) {
    try {
      const res = await fetch(proxyFn(yfUrl));
      if (!res.ok) continue;
      const json = await res.json();
      const quotes = (json?.finance?.result?.[0]?.quotes || [])
        .map(q => ({ symbol: q.symbol, name: q.shortName || q.symbol, price: q.regularMarketPrice, change: q.regularMarketChangePercent }))
        .filter(q => q.price != null && q.change != null);
      if (quotes.length) return quotes;
    } catch {}
  }
  return [];
}

async function fetchMoversFromUniverse() {
  const quotes = (await Promise.all(MOVER_UNIVERSE.map(fetchQuoteSingle))).filter(Boolean).filter(q => q.change != null);
  quotes.sort((a, b) => b.change - a.change);
  return { gainers: quotes.slice(0, 7), losers: quotes.slice(-7).reverse() };
}

async function fetchQuoteSingle(symbol) {
  const yfUrl = `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?range=5d&interval=1d`;
  for (const proxyFn of PROXY_FNS) {
    try {
      const res = await fetch(proxyFn(yfUrl));
      if (!res.ok) continue;
      const json = await res.json();
      const m = json?.chart?.result?.[0]?.meta;
      if (!m?.regularMarketPrice) continue;
      const price = m.regularMarketPrice;
      const prev = m.chartPreviousClose;
      const change = prev ? (price - prev) / prev * 100 : null;
      return { symbol, name: m.shortName || m.longName || symbol, price, change };
    } catch {}
  }
  return null;
}

async function fetchQuotes(symbols) {
  const results = await Promise.all(symbols.map(fetchQuoteSingle));
  return results.filter(Boolean).filter(q => q.change != null);
}

// ═══════════════════════════════════════════════════════════
//  INSIDER TRADES — SEC EDGAR Form 4
// ═══════════════════════════════════════════════════════════
async function fetchInsiderFilings() {
  // Parse EDGAR Form 4 RSS and return list of {cik, accNoDash} objects (no network calls per filing)
  const rssUrl = 'https://www.sec.gov/cgi-bin/browse-edgar?action=getcurrent&type=4&dateb=&owner=include&count=40&search_text=&output=atom';
  let rssText = null;
  try { const r = await fetch(rssUrl); if (r.ok) rssText = await r.text(); } catch {}
  if (!rssText) {
    for (const fn of PROXY_FNS) {
      try { const r = await fetch(fn(rssUrl)); if (r.ok) { rssText = await r.text(); break; } } catch {}
    }
  }
  if (!rssText) return [];

  const feedXml = new DOMParser().parseFromString(rssText, 'application/xml');
  const entries = Array.from(feedXml.querySelectorAll('entry'));
  const seen = new Set(), filings = [];

  for (const entry of entries) {
    const title = entry.querySelector('title')?.textContent?.trim() || '';
    const link  = entry.querySelector('link')?.getAttribute('href') || '';
    const idEl  = entry.querySelector('id')?.textContent?.trim() || '';
    if (!title.toLowerCase().includes('(reporting)')) continue;
    const accession = idEl.match(/accession-number=([0-9\-]+)/)?.[1]?.trim();
    if (!accession || seen.has(accession)) continue;
    seen.add(accession);
    const cik = link.match(/\/Archives\/edgar\/data\/(\d+)\//)?.[1];
    if (!cik) continue;
    filings.push({ cik, accNoDash: accession.replace(/-/g, '') });
    if (filings.length >= 10) break;
  }
  return filings;
}

async function fetchOneInsiderTrade({ cik, accNoDash }) {
  try {
    // Step 1: get exact XML filename from data.sec.gov/submissions (direct — has CORS *)
    const accDash = accNoDash.replace(/^(\d{10})(\d{2})(\d{6})$/, '$1-$2-$3');
    let primaryDoc = 'ownership.xml';
    try {
      const subUrl = `https://data.sec.gov/submissions/CIK${cik.padStart(10,'0')}.json`;
      const r = await fetch(subUrl);
      if (r.ok) {
        const sub = await r.json();
        const idx = (sub.filings?.recent?.accessionNumber || []).indexOf(accDash);
        if (idx >= 0) primaryDoc = (sub.filings.recent.primaryDocument[idx] || primaryDoc).replace(/^xsl\w+\//, '');
      }
    } catch {}

    // Step 2: fetch the XML via proxy (one call with the correct filename)
    const xmlUrl = `https://www.sec.gov/Archives/edgar/data/${cik}/${accNoDash}/${primaryDoc}`;
    let xmlText = null;
    for (const fn of PROXY_FNS) {
      try { const r = await fetch(fn(xmlUrl)); if (r.ok) { xmlText = await r.text(); break; } } catch {}
    }
    if (!xmlText) return null;

    const doc = new DOMParser().parseFromString(xmlText, 'text/xml');
    const issuerName = doc.querySelector('issuerName')?.textContent?.trim() || '';
    const ticker     = doc.querySelector('issuerTradingSymbol')?.textContent?.trim() || '';
    const ownerName  = doc.querySelector('rptOwnerName')?.textContent?.trim() || '';
    const role       = doc.querySelector('officerTitle')?.textContent?.trim() || '';

    let buy = 0, sell = 0;
    for (const txn of doc.querySelectorAll('nonDerivativeTransaction')) {
      const shares = parseFloat(txn.querySelector('transactionShares value')?.textContent || '0');
      const price  = parseFloat(txn.querySelector('transactionPricePerShare value')?.textContent || '0');
      const code   = txn.querySelector('transactionAcquiredDisposedCode value')?.textContent?.trim();
      if (code === 'A') buy  += shares * price;
      if (code === 'D') sell += shares * price;
    }
    const isBuy = buy >= sell;
    const amount = isBuy ? buy : sell;
    if (amount < 10000) return null;
    return { insider: ownerName, company: issuerName, ticker, role, type: isBuy ? 'BUY' : 'SELL', amount };
  } catch { return null; }
}

// ═══════════════════════════════════════════════════════════
//  BACKGROUND STRESS TEST — cross-verify vs Nasdaq.com API
// ═══════════════════════════════════════════════════════════
async function runStressTest() {
  const toVerify = trackedStocks
    .map(s => ({ ticker: s.ticker, yfPrice: results[s.ticker]?.data?.currentPrice }))
    .filter(s => s.yfPrice);

  if (!toVerify.length) return;

  const verifyLog = JSON.parse(localStorage.getItem('smt_verify') || '[]');
  const run = { timestamp: new Date().toISOString(), checks: [] };

  for (const { ticker, yfPrice } of toVerify) {
    try {
      // Nasdaq.com public quote API — official exchange data, no key required
      const nasdaqUrl = `https://api.nasdaq.com/api/quote/${ticker}/info?assetclass=stocks`;
      let json = null;
      for (const fn of PROXY_FNS) {
        try {
          const r = await fetch(fn(nasdaqUrl));
          if (r.ok) { json = await r.json(); break; }
        } catch {}
      }
      if (!json) { run.checks.push({ ticker, result: 'NASDAQ_UNAVAILABLE' }); continue; }

      const priceStr = json?.data?.primaryData?.lastSalePrice?.replace(/[$,]/g, '') || '';
      const nasdaqPrice = parseFloat(priceStr);
      if (isNaN(nasdaqPrice)) { run.checks.push({ ticker, result: 'PARSE_ERROR' }); continue; }

      const diff = Math.abs(yfPrice - nasdaqPrice) / nasdaqPrice * 100;
      const passed = diff <= 1.0; // allow ≤1% difference (bid/ask spread, timestamps)

      run.checks.push({ ticker, yfPrice: +yfPrice.toFixed(2), nasdaqPrice: +nasdaqPrice.toFixed(2), diffPct: +diff.toFixed(3), passed });
      if (passed) {
        console.log(`%c[Verify ✓] ${ticker}  YF $${yfPrice.toFixed(2)}  NASDAQ $${nasdaqPrice.toFixed(2)}  Δ${diff.toFixed(3)}%`, 'color:#10b981');
      } else {
        console.warn(`[Verify ⚠] ${ticker}  YF $${yfPrice.toFixed(2)}  NASDAQ $${nasdaqPrice.toFixed(2)}  Δ${diff.toFixed(3)}%  — discrepancy exceeds 1%`);
      }
    } catch (e) {
      run.checks.push({ ticker, result: 'ERROR', error: e.message });
      console.log(`[Verify] ${ticker}: ${e.message}`);
    }
  }

  const passed = run.checks.filter(c => c.passed).length;
  const total  = run.checks.filter(c => c.passed != null).length;
  console.log(`%c[Verify] Run complete — ${passed}/${total} passed. Full log: localStorage.getItem('smt_verify')`, 'color:#3b82f6;font-weight:bold');

  verifyLog.unshift(run);
  localStorage.setItem('smt_verify', JSON.stringify(verifyLog.slice(0, 50)));
}

async function refreshTicker() {
  // Fetch each feed independently so one failure doesn't block the others

  // 1. Movers — try screener first, fall back to fixed universe
  (async () => {
    let gainers = await fetchScreener('day_gainers');
    let losers  = await fetchScreener('day_losers');
    if (!gainers.length && !losers.length) {
      ({ gainers, losers } = await fetchMoversFromUniverse());
    }
    tickerCache.movers = { gainers, losers };
    if (activeTicker === 'movers') renderTickerContent();
  })();

  // 2. Industries — all 11 sector ETFs
  (async () => {
    const sectors = await fetchQuotes(Object.keys(SECTOR_MAP));
    const named = sectors.map(q => ({ ...q, name: SECTOR_MAP[q.symbol] || q.symbol }));
    named.sort((a, b) => Math.abs(b.change) - Math.abs(a.change));
    tickerCache.industries = named;
    if (activeTicker === 'industries') renderTickerContent();
  })();

  // 3. Berkshire holdings
  (async () => {
    const brkQuotes = await fetchQuotes(BRK_HOLDINGS.map(h => h.symbol));
    const weighted = brkQuotes.map(q => {
      const h = BRK_HOLDINGS.find(h => h.symbol === q.symbol);
      return { ...q, name: h?.name || q.name, weight: h?.weight || 0 };
    }).sort((a, b) => b.weight - a.weight);
    tickerCache.berkshire = weighted;
    if (activeTicker === 'berkshire') renderTickerContent();
  })();

  // 4. Insider trades — stream results in as each filing resolves so the tab populates quickly
  (async () => {
    tickerCache.insiders = [];
    const filings = await fetchInsiderFilings();   // fast: just RSS parse
    if (!filings.length) return;
    filings.map(async f => {
      const trade = await fetchOneInsiderTrade(f);
      if (!trade) return;
      tickerCache.insiders = [...tickerCache.insiders, trade]
        .sort((a, b) => b.amount - a.amount)
        .slice(0, 10);
      if (activeTicker === 'insiders') renderTickerContent();
    });
  })();
}

function itemHtml(q, extra) {
  const sign = q.change >= 0 ? '+' : '';
  const cls = q.change >= 0 ? 'pos' : 'neg';
  return `<div class="ticker-item">
    <span class="ticker-sym">${q.symbol}</span>
    <span class="ticker-name">${q.name}</span>
    <span class="ticker-price">$${q.price?.toFixed(2) ?? '—'}</span>
    <span class="ticker-chg ${cls}">${sign}${q.change?.toFixed(2)}%</span>
    ${extra || ''}
  </div>`;
}

function scrollHtml(inner, itemCount) {
  const duration = Math.max(30, itemCount * 5);
  return `<div class="ticker-scroll" style="animation-duration:${duration}s">${inner}${inner}</div>`;
}

function renderTickerContent() {
  const wrap = document.getElementById('tickerWrap');
  if (!wrap) return;
  const data = tickerCache[activeTicker];
  if (!data) { wrap.innerHTML = '<div class="ticker-loading">Loading…</div>'; return; }

  let inner = '';
  let count = 0;

  if (activeTicker === 'movers') {
    const { gainers, losers } = data;
    if (!gainers.length && !losers.length) { wrap.innerHTML = '<div class="ticker-loading">No mover data</div>'; return; }
    const gHtml = gainers.length ? `<div class="ticker-section up">▲ Gainers</div>${gainers.map(q => itemHtml(q)).join('')}` : '';
    const lHtml = losers.length  ? `<div class="ticker-section dn">▼ Losers</div>${losers.map(q => itemHtml(q)).join('')}` : '';
    inner = gHtml + lHtml;
    count = gainers.length + losers.length;

  } else if (activeTicker === 'industries') {
    if (!data.length) { wrap.innerHTML = '<div class="ticker-loading">No sector data</div>'; return; }
    const bigUp = data.filter(q => q.change >= 0);
    const bigDn = data.filter(q => q.change < 0);
    const uHtml = bigUp.length ? `<div class="ticker-section up">▲ Leading</div>${bigUp.map(q => itemHtml(q)).join('')}` : '';
    const dHtml = bigDn.length ? `<div class="ticker-section dn">▼ Lagging</div>${bigDn.map(q => itemHtml(q)).join('')}` : '';
    inner = uHtml + dHtml;
    count = data.length;

  } else if (activeTicker === 'berkshire') {
    if (!data.length) { wrap.innerHTML = '<div class="ticker-loading">No Berkshire data</div>'; return; }
    inner = `<div class="ticker-section neutral">BRK Holdings</div>` +
      data.map(q => itemHtml(q, `<span class="ticker-weight">${q.weight}%</span>`)).join('');
    count = data.length;

  } else if (activeTicker === 'insiders') {
    if (!data.length) { wrap.innerHTML = '<div class="ticker-loading">No insider trade data available — SEC filings may be delayed</div>'; return; }
    const fmt = n => n >= 1e9 ? `$${(n/1e9).toFixed(1)}B` : n >= 1e6 ? `$${(n/1e6).toFixed(1)}M` : `$${(n/1e3).toFixed(0)}K`;
    inner = `<div class="ticker-section neutral">SEC Form 4 Insider Trades</div>` +
      data.map(t => `<div class="ticker-item">
        <span class="ticker-sym">${t.ticker || '—'}</span>
        <span class="ticker-name">${t.company.length > 18 ? t.company.slice(0,18)+'…' : t.company}</span>
        <span class="ticker-name" style="color:var(--muted)">${t.insider.split(' ').slice(-1)[0]}</span>
        <span class="ticker-badge badge-${t.type.toLowerCase()}">${t.type}</span>
        <span class="ticker-chg ${t.type==='BUY'?'pos':'neg'}">${fmt(t.amount)}</span>
      </div>`).join('');
    count = data.length;
  }

  wrap.innerHTML = scrollHtml(inner, count);
}

function switchTicker(type) {
  activeTicker = type;
  document.querySelectorAll('.ticker-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + type)?.classList.add('active');
  renderTickerContent();
}

async function refreshAll() {
  if (isRefreshing) return;
  isRefreshing = true;
  setRefreshBtn(true);

  try {
    marketCache = await fetchYF(MARKET_TICKER);

    const sectors = [...new Set(trackedStocks.map(s => s.sector).filter(Boolean))];
    await Promise.allSettled(sectors.map(async sec => {
      const etf = SECTOR_ETFS[sec];
      if (etf) {
        try { sectorCache[sec] = await fetchYF(etf); } catch {}
      }
    }));

    await Promise.allSettled(trackedStocks.map(async stock => {
      try {
        const [data, headlines] = await Promise.all([
          fetchYF(stock.ticker),
          fetchNews(stock.ticker)
        ]);

        const sec = sectorCache[stock.sector];
        const attr = (sec && marketCache) ? attribute(data, marketCache, sec) : null;
        const event = classifyEvent(headlines);
        const change = (data.currentPrice && data.previousClose)
          ? (data.currentPrice / data.previousClose - 1) * 100 : null;
        const flagged = change !== null && Math.abs(change) >= stock.threshold;

        results[stock.ticker] = { data, attr, event, change, flagged, error: null };
      } catch (e) {
        results[stock.ticker] = { error: e.message, flagged: false };
      }
    }));

    renderContent();
    document.getElementById('refreshTime').textContent =
      'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    // Background data verification — results logged to console (DevTools) and localStorage
    setTimeout(runStressTest, 3000);
  } catch (e) {
    renderBanner('banner-error', '❌ ' + e.message);
  }

  isRefreshing = false;
  setRefreshBtn(false);
}

          </div>
        </div>
      </aside>

      <div class="content">
        <div id="banner"></div>
        <div id="stock-grid" class="stock-grid">
          <div class="empty-state">
            <div class="empty-icon">📊</div>
            <p>Add a stock on the left to begin tracking.</p>
          </div>
        </div>
      </div>
    </div>
  `;
}

function renderContent() {
  const grid = document.getElementById('stock-grid');
  const banner = document.getElementById('banner');

  if (trackedStocks.length === 0) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📊</div><p>Add a stock on the left to begin tracking.</p></div>`;
    banner.innerHTML = '';
    return;
  }

  const flagged = trackedStocks.filter(s => results[s.ticker]?.flagged);
  if (flagged.length > 0) {
    banner.innerHTML = `<div class="banner banner-alert">⚠️ <strong>${flagged.length} stock${flagged.length > 1 ? 's' : ''} flagged:</strong> ${flagged.map(s => s.ticker).join(', ')} exceeded threshold — see details below</div>`;
  } else if (trackedStocks.length > 0) {
    banner.innerHTML = `<div class="banner banner-info">✓ Monitoring ${trackedStocks.length} stock${trackedStocks.length > 1 ? 's' : ''} — no unusual movements today</div>`;
  } else {
    banner.innerHTML = '';
  }

  // Destroy old chart instances
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  grid.innerHTML = trackedStocks.map(s => renderCard(s)).join('');

  // Mount charts for flagged stocks
  trackedStocks.forEach(s => {
    const r = results[s.ticker];
    if (r?.attr && r.flagged) mountChart(s.ticker, r.attr);
  });
}

function renderCard(stock) {
  const r = results[stock.ticker];

  if (!r) {
    return `<div class="stock-card is-loading">
      <div class="sc-header"><div class="sc-title"><span class="sc-ticker">${stock.ticker}</span></div></div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px;color:var(--muted)"><div class="spinner"></div> Loading…</div>
    </div>`;
  }

  if (r.error) {
    return `<div class="stock-card is-error">
      <div class="sc-header">
        <div class="sc-title"><span class="sc-ticker">${stock.ticker}</span></div>
        <button class="sc-remove" onclick="removeStock('${stock.ticker}')">✕</button>
      </div>
      <div class="error-text">⚠️ ${r.error}</div>
    </div>`;
  }

  const { data, attr, event, change, flagged } = r;
  const changeSign = change >= 0 ? '+' : '';
  const changeClass = change >= 0 ? 'pos' : 'neg';
  const eventHtml = event
    ? `<span class="event-tag" style="color:${event.color};border-color:${event.color}33;background:${event.color}10">● ${event.label}</span>`
    : '';

  let attrHtml = '';

  if (attr && flagged) {
    // Full attribution section for flagged stocks
    const rl = recoveryLabel(attr.recoveryProb);
    const narrative = buildNarrative(stock.ticker, attr, event);
    const occScore = attr.opportunityScore;
    const occColor = opportunityColor(occScore);
    const sign = v => (v >= 0 ? '+' : '') + v.toFixed(2) + '%';

    attrHtml = `
      <hr class="divider">
      <div class="attr-label-row">
        <span class="attr-section-title">Movement Attribution</span>
        <span style="font-size:11px;color:var(--muted)">β<sub>M</sub>${attr.βM} &nbsp; β<sub>I</sub>${attr.βI}</span>
      </div>

      <div class="attr-chart-wrap">
        <canvas id="chart-${stock.ticker}" class="attr-chart-canvas" width="130" height="130"></canvas>
        <div class="attr-summary-text">
          <div class="attr-bars">
            <div class="attr-bar-row">
              <span class="attr-bar-label lbl-market">Market</span>
              <div class="attr-bar-bg"><div class="attr-bar-fill fill-market" style="width:${attr.mPct.toFixed(1)}%"></div></div>
              <span class="attr-bar-pct">${attr.mPct.toFixed(1)}%</span>
              <span class="attr-bar-val ${attr.mComp >= 0 ? 'pos' : 'neg'}">${sign(attr.mComp)}</span>
            </div>
            <div class="attr-bar-row">
              <span class="attr-bar-label lbl-industry">Industry</span>
              <div class="attr-bar-bg"><div class="attr-bar-fill fill-industry" style="width:${attr.iPct.toFixed(1)}%"></div></div>
              <span class="attr-bar-pct">${attr.iPct.toFixed(1)}%</span>
              <span class="attr-bar-val ${attr.iComp >= 0 ? 'pos' : 'neg'}">${sign(attr.iComp)}</span>
            </div>
            <div class="attr-bar-row">
              <span class="attr-bar-label lbl-company">Company</span>
              <div class="attr-bar-bg"><div class="attr-bar-fill fill-company" style="width:${attr.cPct.toFixed(1)}%"></div></div>
              <span class="attr-bar-pct">${attr.cPct.toFixed(1)}%</span>
              <span class="attr-bar-val ${attr.cComp >= 0 ? 'pos' : 'neg'}">${sign(attr.cComp)}</span>
            </div>
          </div>
        </div>
      </div>

      <div class="recovery-box" style="border-color:${rl.color}22;background:${rl.color}08">
        <div class="recovery-top">
          <span class="recovery-title">Recovery Probability</span>
          <span class="recovery-prob" style="color:${rl.color}">${attr.recoveryProb}%</span>
        </div>
        <div class="recovery-level" style="color:${rl.color}">Likelihood: ${rl.text}</div>
        <div class="recovery-reason">
          Market: ${RECOVERY_RATES.market*100}% historical rate &nbsp;·&nbsp;
          Industry: ${RECOVERY_RATES.industry*100}% &nbsp;·&nbsp;
          Company: ${RECOVERY_RATES.company*100}%
        </div>
      </div>

      <div class="opp-score-row" style="margin-bottom:10px">
        <span class="opp-score-label">Opportunity Score</span>
        <div class="opp-score-bar-bg">
          <div class="opp-score-bar-fill" style="width:${occScore}%;background:${occColor}"></div>
        </div>
        <span class="opp-score-val" style="color:${occColor}">${occScore.toFixed(0)}</span>
      </div>

      <div class="narrative">${narrative}</div>
    `;
  } else if (attr) {
    // Mini attribution bar for non-flagged stocks
    attrHtml = `
      <hr class="divider">
      <div class="mini-attr">
        <div style="font-size:11px;color:var(--muted);margin-bottom:3px">Today's attribution</div>
        <div class="mini-bar">
          <div class="mini-seg fill-market" style="width:${attr.mPct.toFixed(1)}%" title="Market ${attr.mPct.toFixed(1)}%"></div>
          <div class="mini-seg fill-industry" style="width:${attr.iPct.toFixed(1)}%" title="Industry ${attr.iPct.toFixed(1)}%"></div>
          <div class="mini-seg fill-company" style="width:${attr.cPct.toFixed(1)}%" title="Company ${attr.cPct.toFixed(1)}%"></div>
        </div>
        <div class="mini-legend">
          <span><span class="mini-dot" style="background:var(--market)"></span>${attr.mPct.toFixed(0)}% mkt</span>
          <span><span class="mini-dot" style="background:var(--industry)"></span>${attr.iPct.toFixed(0)}% ind</span>
          <span><span class="mini-dot" style="background:var(--company)"></span>${attr.cPct.toFixed(0)}% co</span>
          <span style="margin-left:auto">Rec. prob. ${attr.recoveryProb}%</span>
        </div>
      </div>
    `;
  } else {
    attrHtml = `<div style="font-size:11px;color:var(--muted);margin-top:10px">No sector data — attribution unavailable</div>`;
  }

  return `
    <div class="stock-card ${flagged ? 'is-flagged' : ''}">
      <div class="sc-header">
        <div class="sc-title">
          <span class="sc-ticker">${stock.ticker}</span>
          <span class="sc-badge ${flagged ? 'badge-flagged' : 'badge-normal'}">${flagged ? '⚠ Flagged' : '● Watching'}</span>
        </div>
        <button class="sc-remove" onclick="removeStock('${stock.ticker}')" title="Remove">✕</button>
      </div>
      <div class="sc-name">${data.name || ''}</div>
      <div class="sc-price-row">
        <span class="sc-price">$${data.currentPrice?.toFixed(2) ?? '—'}</span>
        <span class="sc-change ${changeClass}">${changeSign}${change?.toFixed(2) ?? '—'}%</span>
      </div>
      <div class="sc-meta">
        Threshold: ±${stock.threshold}% &nbsp;·&nbsp; Sector: ${stock.sector}
        ${eventHtml}
      </div>
      ${attrHtml}
    </div>
  `;
}

function mountChart(ticker, attr) {
  const canvas = document.getElementById(`chart-${ticker}`);
  if (!canvas) return;
  if (chartInstances[ticker]) chartInstances[ticker].destroy();

  chartInstances[ticker] = new Chart(canvas.getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['Market', 'Industry', 'Company'],
      datasets: [{
        data: [attr.mPct, attr.iPct, attr.cPct],
        backgroundColor: ['#3b82f6', '#f59e0b', '#8b5cf6'],
        borderColor: '#13162a',
        borderWidth: 3,
        hoverOffset: 4
      }]
    },
    options: {
      responsive: false,
      cutout: '62%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${ctx.label}: ${ctx.parsed.toFixed(1)}%`
          }
        }
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════
//  TICKER AUTOCOMPLETE
// ═══════════════════════════════════════════════════════════
let _suggestTimer = null;
let _suggestIndex = -1;
let _suggestItems = [];

async function fetchSuggestions(query) {
  const url = `https://query2.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(query)}&quotesCount=7&newsCount=0&listsCount=0`;
  for (const fn of PROXY_FNS) {
    try {
      const r = await fetch(fn(url));
      if (!r.ok) continue;
      const j = await r.json();
      return (j?.finance?.result?.[0]?.quotes || j?.quotes || [])
        .filter(q => q.symbol && q.quoteType !== 'MUTUALFUND')
        .slice(0, 7)
        .map(q => ({ symbol: q.symbol, name: q.shortname || q.longname || q.symbol, type: q.quoteType || '' }));
    } catch {}
  }
  return [];
}

function renderSuggestions(items) {
  const box = document.getElementById('ticker-suggest');
  if (!box) return;
  _suggestItems = items;
  _suggestIndex = -1;
  if (!items.length) { box.style.display = 'none'; return; }
  box.innerHTML = items.map((it, i) =>
    `<div class="suggest-item" data-i="${i}" onmousedown="selectSuggestion(${i})">
      <span class="suggest-sym">${it.symbol}</span>
      <span class="suggest-name">${it.name}</span>
      <span class="suggest-type">${it.type}</span>
    </div>`
  ).join('');
  box.style.display = 'block';
}

function selectSuggestion(i) {
  const it = _suggestItems[i];
  if (!it) return;
  const inp = document.getElementById('inp-ticker');
  inp.value = it.symbol;
  closeSuggestions();
}

function closeSuggestions() {
  const box = document.getElementById('ticker-suggest');
  if (box) box.style.display = 'none';
  _suggestIndex = -1;
}

function onTickerInput(e) {
  const q = e.target.value.trim();
  clearTimeout(_suggestTimer);
  if (q.length < 1) { closeSuggestions(); return; }
  _suggestTimer = setTimeout(async () => {
    const items = await fetchSuggestions(q);
    renderSuggestions(items);
  }, 220);
}

function onTickerKeydown(e) {
  const box = document.getElementById('ticker-suggest');
  const visible = box && box.style.display !== 'none';
  if (e.key === 'Enter') {
    if (visible && _suggestIndex >= 0) { e.preventDefault(); selectSuggestion(_suggestIndex); }
    else { closeSuggestions(); addStock(); }
    return;
  }
  if (e.key === 'Escape') { closeSuggestions(); return; }
  if (!visible) return;
  const rows = box.querySelectorAll('.suggest-item');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    _suggestIndex = Math.min(_suggestIndex + 1, rows.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    _suggestIndex = Math.max(_suggestIndex - 1, -1);
  } else { return; }
  rows.forEach((r, i) => r.classList.toggle('active', i === _suggestIndex));
  if (_suggestIndex >= 0) document.getElementById('inp-ticker').value = _suggestItems[_suggestIndex].symbol;
}

// Close suggestions when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('#inp-ticker') && !e.target.closest('#ticker-suggest')) closeSuggestions();
});

// ═══════════════════════════════════════════════════════════
//  STOCK MANAGEMENT
// ═══════════════════════════════════════════════════════════
function addStock() {
  const ticker = document.getElementById('inp-ticker').value.trim().toUpperCase();
  const sector = document.getElementById('inp-sector').value;
  const threshold = parseFloat(document.getElementById('inp-thresh').value);

  if (!ticker) return alert('Enter a ticker symbol.');
  if (!sector) return alert('Select a sector.');
  if (isNaN(threshold) || threshold <= 0) return alert('Enter a valid threshold percentage.');
  if (trackedStocks.find(s => s.ticker === ticker)) return alert(`${ticker} is already tracked.`);

  trackedStocks.push({ ticker, sector, threshold });
  saveStocks();
  document.getElementById('inp-ticker').value = '';
  renderContent();
  refreshAll();
}

function removeStock(ticker) {
  if (chartInstances[ticker]) { chartInstances[ticker].destroy(); delete chartInstances[ticker]; }
  trackedStocks = trackedStocks.filter(s => s.ticker !== ticker);
  delete results[ticker];
  saveStocks();
  renderContent();
}

function saveStocks() {
  localStorage.setItem('smt_stocks', JSON.stringify(trackedStocks));
}

// ═══════════════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════════════
function setRefreshBtn(loading) {
  const btn = document.getElementById('refreshBtn');
  if (!btn) return;
  btn.textContent = loading ? '⏳' : '↻ Refresh';
  btn.disabled = loading;
}

function renderBanner(cls, html) {
  const el = document.getElementById('banner');
  if (el) el.innerHTML = `<div class="banner ${cls}">${html}</div>`;
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
renderApp();
renderContent();
refreshTicker();
if (trackedStocks.length > 0) refreshAll();
setInterval(refreshAll, REFRESH_MS);
setInterval(refreshTicker, 30 * 60 * 1000);
</script>
